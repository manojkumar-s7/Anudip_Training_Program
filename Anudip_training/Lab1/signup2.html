<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUP</title>
</head>
<body>
    <h1>Sign Up</h1>
    <p>
        Username:
        <input class="name" type="text" required placeholder="Please enter your name"/>
    </p>
    <p>
        Password:
        <input class="pass" type="password" required placeholder=" enter your pass"/>
    </p>
    <p>
        mobile number:
        <input class="num" type="tel" required placeholder="Please enter your num"/>
    </p>
    <btn>
        <input class="submit" type="submit">
        <input class="reset" type="reset">
    </btn>
    


    
</body>
</html>
